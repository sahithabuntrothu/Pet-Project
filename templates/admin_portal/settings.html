{% extends 'staff/base_staff.html' %}
{% block staff_content %}

<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
    <h1 class="h2 fw-bold">Settings</h1>
</div>

<div class="card shadow-sm border-0 rounded-4 mb-4" style="max-width: 600px;">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-shield-lock text-primary me-2"></i>Change Password</h5>
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label fw-bold small text-muted text-uppercase mb-1">
                    {{ field.label }}
                    {% if field.help_text %}
                    <i class="bi bi-info-circle text-primary ms-1" data-bs-toggle="tooltip" data-bs-placement="top"
                        title="{{ field.help_text|striptags }}" style="cursor: pointer;"></i>
                    {% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small mt-1">
                    {% for error in field.errors %}
                    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary mt-3 px-4 rounded-pill fw-bold">Update Password <i
                    class="bi bi-check-circle ms-1"></i></button>
        </form>
    </div>
</div>

{% endblock %}
