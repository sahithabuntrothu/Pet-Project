{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4">
    <div class="row">
        <!-- Sidebar Navigation -->
        <div class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse shadow-sm rounded-4 p-3 me-3"
            style="min-height: 80vh;">
            <div class="position-sticky pt-3">
                <h5 class="fw-bold px-3 mb-4 text-primary"><i class="bi bi-shield-lock-fill me-2"></i>Admin Portal</h5>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'custom-admin-dashboard' %}active bg-primary text-white rounded-3{% else %}text-dark{% endif %}"
                            href="{% url 'custom-admin-dashboard' %}">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'admin-request-list' %}active bg-primary text-white rounded-3{% else %}text-dark{% endif %}"
                            href="{% url 'admin-request-list' %}">
                            <i class="bi bi-file-earmark-text me-2"></i> Pet Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'custom-admin-users' %}active bg-primary text-white rounded-3{% else %}text-dark{% endif %}"
                            href="{% url 'custom-admin-users' %}">
                            <i class="bi bi-people me-2"></i> Users
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'custom-admin-abuse-reports' %}active bg-primary text-white rounded-3{% else %}text-dark{% endif %}"
                            href="{% url 'custom-admin-abuse-reports' %}">
                            <i class="bi bi-flag me-2"></i> Abuse Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'admin-contact-requests' %}active bg-primary text-white rounded-3{% else %}text-dark{% endif %}"
                            href="{% url 'admin-contact-requests' %}">
                            <i class="bi bi-shield-lock me-2"></i> Contact Requests
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-danger" href="{% url 'landing' %}">
                            <i class="bi bi-box-arrow-left me-2"></i> Exit Portal
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4">
            {% block admin_content %}
            {% endblock %}
        </main>
    </div>
</div>

{% endblock %}
