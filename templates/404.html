{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center py-5 my-5 fade-in-up">
    <div class="text-center">
        <!-- Using a Bootstrap icon instead of an image to keep it lightweight and fast -->
        <i class="bi bi-compass text-muted mb-4" style="font-size: 8rem;"></i>
        <h1 class="display-1 fw-bold text-dark mb-2">404</h1>
        <h2 class="h3 fw-normal text-muted mb-4">Oops! This page ran away.</h2>
        <p class="lead text-secondary mb-5 mx-auto" style="max-width: 500px;">
            We couldn't find the page you're looking for. It might have been removed, had its name changed, or is
            temporarily unavailable.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'landing' %}" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm">
                <i class="bi bi-house-door-fill me-2"></i> Go Home
            </a>
            <a href="{% url 'search-pets' %}" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
                <i class="bi bi-search me-2"></i> Search Pets
            </a>
        </div>
    </div>
</div>
{% endblock %}
